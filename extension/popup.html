<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 400px;
      min-width: 280px;
      max-width: 400px;
      box-sizing: border-box;
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      background-color: #1a1a1a;
      background-image: linear-gradient(rgba(26, 26, 26, 0.72), rgba(26, 26, 26, 0.72)), url(guy-hot-dogs.png);
      background-size: cover;
      background-position: center;
      color: #ffffff;
    }

    /* ── Header ── */
    #header {
      text-align: center;
      padding: 12px 8px 6px;
    }

    h1 {
      margin: 4px 0 8px;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: linear-gradient(180deg, #ff8c00, #ffd700);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 6px #ff4500);
    }

    /* ── Flames ── */
    .flames {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 2px;
    }

    .flame {
      width: 14px;
      height: 32px;
      background: radial-gradient(ellipse at bottom, #ffd700 0%, #ff8c00 40%, #ff4500 70%, transparent 100%);
      border-radius: 50% 50% 20% 20% / 60% 60% 40% 40%;
      transform-origin: bottom center;
      animation: flicker 0.9s ease-in-out infinite;
      will-change: transform, opacity;
    }

    .flame:nth-child(1) { animation-duration: 0.8s; animation-delay: 0s; }
    .flame:nth-child(2) { animation-duration: 1.0s; animation-delay: 0.2s; height: 38px; width: 16px; }
    .flame:nth-child(3) { animation-duration: 0.9s; animation-delay: 0.1s; }

    @keyframes flicker {
      0%   { transform: scaleX(1)    scaleY(1)    rotate(-2deg); opacity: 0.9;  }
      25%  { transform: scaleX(0.9)  scaleY(1.1)  rotate(1deg);  opacity: 1;    }
      50%  { transform: scaleX(1.05) scaleY(0.95) rotate(-1deg); opacity: 0.85; }
      75%  { transform: scaleX(0.95) scaleY(1.05) rotate(2deg);  opacity: 0.95; }
      100% { transform: scaleX(1)    scaleY(1)    rotate(-2deg); opacity: 0.9;  }
    }

    /* ── Rows ── */
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 10px;
      border-bottom: 1px solid #333;
    }
    .row:last-child { border-bottom: none; }

    .host {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      color: #ffffff;
    }
    .host::before { content: '🍔 '; }

    /* ── Button ── */
    button {
      margin-left: 8px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      background: linear-gradient(135deg, #ff4500, #ff8c00);
      color: #ffffff;
      border: none;
      border-radius: 4px;
      transition: box-shadow 0.2s;
    }
    button:hover { box-shadow: 0 0 8px #ff4500; }
    button:active { box-shadow: 0 0 4px #ff4500; transform: scale(0.97); }

    /* ── Empty state ── */
    #empty {
      color: #ff8c00;
      font-size: 13px;
      padding: 12px 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="header">
    <div class="flames">
      <div class="flame"></div>
      <div class="flame"></div>
      <div class="flame"></div>
    </div>
    <h1>FLAVOR TOWN</h1>
  </div>
  <div id="host-list"></div>
  <script src="popup.js"></script>
</body>
</html>
