<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 400px;
      min-width: 280px;
      max-width: 400px;
      min-height: 120px;
      box-sizing: border-box;
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      background-color: #1a1a1a;
      background-image: linear-gradient(rgba(26, 26, 26, 0.72), rgba(26, 26, 26, 0.72)), url(guy-hot-dogs.png);
      background-size: cover;
      background-position: center;
      color: #ffffff;
    }

    /* ── Header ── */
    #header {
      text-align: center;
      padding: 12px 8px 6px;
    }

    h1 {
      margin: 4px 0 8px;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: linear-gradient(180deg, #ff8c00, #ffd700);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 6px #ff4500);
    }

    /* ── Flames ── */
    .flames {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 2px;
    }

    .flame {
      font-size: 22px;
      display: inline-block;
      transform-origin: bottom center;
      animation: fireEmoji 0.9s ease-in-out infinite;
      will-change: transform;
    }

    .flame:nth-child(1) { animation-duration: 0.8s; animation-delay: 0s; }
    .flame:nth-child(2) { animation-duration: 1.0s; animation-delay: 0.2s; font-size: 26px; }
    .flame:nth-child(3) { animation-duration: 0.9s; animation-delay: 0.1s; }

    @keyframes fireEmoji {
      0%   { transform: scaleX(1)    scaleY(1)    rotate(-3deg); }
      25%  { transform: scaleX(0.88) scaleY(1.12) rotate(2deg);  }
      50%  { transform: scaleX(1.08) scaleY(0.92) rotate(-1deg); }
      75%  { transform: scaleX(0.93) scaleY(1.07) rotate(3deg);  }
      100% { transform: scaleX(1)    scaleY(1)    rotate(-3deg); }
    }

    /* ── Rows ── */
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 10px;
      border-bottom: 1px solid #333;
    }
    .row:last-child { border-bottom: none; }

    .host {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      color: #ffffff;
    }
    .host-icon {
      width: 18px;
      height: 18px;
      border-radius: 3px;
      margin-right: 6px;
      flex-shrink: 0;
      vertical-align: middle;
    }

    /* ── Button ── */
    button {
      margin-left: 8px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      background: linear-gradient(135deg, #ff4500, #ff8c00);
      color: #ffffff;
      border: none;
      border-radius: 4px;
      transition: box-shadow 0.2s;
    }
    button:hover { box-shadow: 0 0 8px #ff4500; }
    button:active { box-shadow: 0 0 4px #ff4500; transform: scale(0.97); }

    /* ── Empty state ── */
    #empty {
      color: #ff8c00;
      font-size: 13px;
      padding: 12px 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="header">
    <div class="flames">
      <span class="flame">🔥</span>
      <span class="flame">🔥</span>
      <span class="flame">🔥</span>
    </div>
    <h1>FLAVORTOWN</h1>
  </div>
  <div id="host-list"></div>
  <script src="popup.js"></script>
</body>
</html>
